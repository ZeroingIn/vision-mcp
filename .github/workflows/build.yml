name: build

# Builds release binaries for Windows (MSVC, x86_64), macOS (arm64 + x86_64),
# and Linux (x86_64 glibc + aarch64 musl). Uploads each as a release asset.
#
# The TLS backend is `rustls` with the `ring` provider (no `aws-lc-rs`), so the
# whole project builds with just `rustc` + a C toolchain on every target — no
# CMake, no NASM, no OpenSSL. See README.md → "Build" and Cargo.toml TLS notes.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write   # needed by softprops/action-gh-release to upload assets

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            artifact: vision-mcp.exe
          - os: macos-14          # Apple Silicon runner — builds both arm64 and x86_64
            target: aarch64-apple-darwin
            archive: tar.gz
            artifact: vision-mcp
          - os: macos-14          # cross-compile x86_64 from Apple Silicon (Intel runners are deprecated)
            target: x86_64-apple-darwin
            archive: tar.gz
            artifact: vision-mcp
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
            artifact: vision-mcp
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            archive: tar.gz
            artifact: vision-mcp

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # The aarch64-unknown-linux-musl target needs a musl (not glibc) cross
      # toolchain. `cross` ships a ready-made Docker image for it, which is far
      # more reliable than hand-installing a musl cross-cc on the runner.
      - name: Install cross (Linux aarch64 musl only)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: cargo install --locked cross

      - name: Build release
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-musl" ]; then
            cross build --release --locked --target ${{ matrix.target }}
          else
            cargo build --release --locked --target ${{ matrix.target }}
          fi

      - name: Run tests (native target only)
        if: matrix.target == 'x86_64-pc-windows-msvc' || matrix.target == 'aarch64-apple-darwin' || matrix.target == 'x86_64-unknown-linux-gnu'
        run: cargo test --release --locked --target ${{ matrix.target }}

      - name: Stage artifact
        shell: bash
        run: |
          set -euo pipefail
          STAGE="vision-mcp-${GITHUB_REF_NAME:-dev}-${{ matrix.target }}"
          mkdir -p "$STAGE"
          cp "target/${{ matrix.target }}/release/${{ matrix.artifact }}" "$STAGE/"
          cp README.md LICENSE config.example.toml "$STAGE/"
          # Bundle a portable .cargo/config.toml note for Windows MSVC single-file
          # builds (crt-static); other platforms need no per-machine config.
          if [ "${{ matrix.target }}" = "x86_64-pc-windows-msvc" ]; then
            mkdir -p "$STAGE/.cargo"
            printf '[target.x86_64-pc-windows-msvc]\nrustflags = ["-C", "target-feature=+crt-static"]\n' > "$STAGE/.cargo/config.toml"
          fi
          if [ "${{ matrix.archive }}" = "zip" ]; then
            7z a "$STAGE.zip" "$STAGE"
            echo "ASSET=$STAGE.zip" >> $GITHUB_ENV
          else
            tar czf "$STAGE.tar.gz" "$STAGE"
            echo "ASSET=$STAGE.tar.gz" >> $GITHUB_ENV
          fi

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: vision-mcp-${{ matrix.target }}
          path: vision-mcp-*-${{ matrix.target }}.${{ matrix.archive }}
          if-no-files-found: error

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}
          fail_on_unmatched_files: true
